<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Finalización de la compra</h1>
    </header>

    <main>
        <div class="checkout-contenedor">

            <div id="resumen-compra">
                <img id="checkout-imagen" src="" alt="">
                <h2 id="checkout-nombre"></h2>
                <p id="checkout-precio"></p>
            </div>

            <div class="formulario">
                <h2>Datos del comprador</h2>

                <label>Cantidad</label>
                <select id="cantidad">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>

                <label>Nombre</label>
                <input type="text" id="nombre" placeholder="Tu nombre ">

                <label>Apellido</label>
                <input type="text" id="apellido" placeholder="Tu apellido">

                <label>Documento</label>
                <input type="text" id="documento" placeholder="Sin puntos (Ej: 46744553)">

                <label>Teléfono</label>
                <input type="text" id="telefono" placeholder="Ej: +54 379.......">

                 <label>Mail</label>
                <input type="text" id="Mail" placeholder="Ej:usuario123@gmail.com">

                <label>Provincia</label>
                <select id="provincia">
                    <option value="">Seleccioná una provincia</option>
                        <option value="Buenos Aires">Buenos Aires</option>
                        <option value="Catamarca">Catamarca</option>
                        <option value="Chaco">Chaco</option>
                        <option value="Chubut">Chubut</option>
                        <option value="Córdoba">Córdoba</option>
                        <option value="Corrientes">Corrientes</option>
                        <option value="Entre Ríos">Entre Ríos</option>
                        <option value="Formosa">Formosa</option>
                        <option value="Jujuy">Jujuy</option>
                        <option value="La Pampa">La Pampa</option>
                        <option value="La Rioja">La Rioja</option>
                        <option value="Mendoza">Mendoza</option>
                        <option value="Misiones">Misiones</option>
                        <option value="Neuquén">Neuquén</option>
                        <option value="Río Negro">Río Negro</option>
                        <option value="Salta">Salta</option>
                        <option value="San Juan">San Juan</option>
                        <option value="San Luis">San Luis</option>
                        <option value="Santa Cruz">Santa Cruz</option>
                        <option value="Santa Fe">Santa Fe</option>
                        <option value="Santiago del Estero">Santiago del Estero</option>
                        <option value="Tierra del Fuego">Tierra del Fuego</option>
                        <option value="Tucumán">Tucumán</option>
                </select>

                <label>Localidad</label>
                <input type="text" id="localidad" placeholder="Tu localidad">

                <button onclick="confirmarCompra()">Confirmar compra</button>

            </div>
        </div>
    </main>

    <script src="js/checkout.js"></script>
</body>
<script src="js/checkout.js"></script>
</html>
